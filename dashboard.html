<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Coin & Star badges */
    .nav-badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .nav-badge.star {
      background: rgba(251,191,36,0.12);
      border: 1.5px solid rgba(251,191,36,0.35);
      color: #fbbf24;
    }
    .nav-badge.coin {
      background: rgba(52,211,153,0.1);
      border: 1.5px solid rgba(52,211,153,0.3);
      color: #34d399;
    }
    .nav-badge .badge-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
    }

    .btn-leaderboard {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      background: transparent;
      border: 1.5px solid rgba(251,191,36,0.4);
      color: #fbbf24;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-leaderboard:hover {
      background: rgba(251,191,36,0.08);
      border-color: #fbbf24;
    }

    /* E'lon banner */
    .announce-banner {
      margin: 0 0 20px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .announce-item-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .announce-item-banner.type-yangilik {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
    }
    .announce-item-banner.type-ogohlantirish {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.25);
    }
    .announce-item-banner.type-sovga {
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.25);
    }
    .announce-item-banner.type-eslatma {
      background: rgba(139,127,184,0.08);
      border: 1px solid rgba(139,127,184,0.2);
    }
    .announce-item-banner.type-yangilanish {
      background: rgba(96,165,250,0.08);
      border: 1px solid rgba(96,165,250,0.2);
    }
    .announce-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .announce-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .announce-close:hover { color: var(--text-muted); }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--purple-glow);
      border: 1.5px solid var(--purple-main);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--purple-light);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">AzWord</div>
    <div class="nav-user">

      <!-- Coin & Star badges -->
      <div class="nav-badges">
        <div class="nav-badge star" title="Yulduzchalar (reyting)">
          <span class="badge-icon">⭐</span>
          <span class="badge-val" id="nav-stars">0</span>
        </div>
        <div class="nav-badge coin" title="Tangalar (xarid)">
          <span class="badge-icon">🪙</span>
          <span class="badge-val" id="nav-coins">0</span>
        </div>
      </div>

      <div class="profile-avatar" id="profile-avatar">
        <span id="avatar-text">A</span>
      </div>

      <div class="profile-dropdown" id="profile-dropdown">
        <div class="profile-head">
          <div class="profile-avatar-lg">
            <span id="avatar-text-lg">A</span>
          </div>

          <h4 id="user-name">...</h4>
          <p id="user-email">...</p>
        </div>

        <div class="profile-stats"><div id="profileStats">📚 Yuklanmoqda...</div></div>
        <button class="profile-btn-item" onclick="window.location.href='profile.html'">👤 Profil</button>
        <div id="admin-btn-wrap" style="display:none">
          <button class="profile-btn-item" style="color:var(--danger)" onclick="window.location.href='admin.html'">⚙️ Admin panel</button>
        </div>
        <button class="profile-btn-item" onclick="logout()">🚪 Chiqish</button>
      </div>

    </div>
  </nav>

  <div class="dashboard">

    <div class="dash-header">
      <h1>Salom, <span id="greeting-name">...</span> 👋</h1>
      <div style="display:flex;gap:10px;">
        <button class="btn-leaderboard" onclick="window.location.href='leaderboard.html'">
          🏆 Leaderboard
        </button>
        <button class="btn-leaderboard" onclick="window.location.href='shop.html'" style="border-color:rgba(52,211,153,0.4);color:#34d399">
          🛒 Shop
        </button>
        <button class="btn-leaderboard" onclick="window.location.href='achievements.html'" style="border-color:rgba(251,191,36,0.4);color:#fbbf24">
          🏅 Mukofotlar
        </button>
        <button class="btn-add" onclick="openModal()">
          <span>＋</span> Yangi bo'lim
        </button>
      </div>
    </div>

    <!-- E'lonlar banneri -->
    <div class="announce-banner" id="announce-banner"></div>

    <div id="admin-section" style="display:none">
      <div class="section-label">📚 Umumiy bo'limlar</div>
      <div class="folder-grid" id="admin-folders">
        <div class="empty-state">
          <div class="emoji">📭</div>
          <p>Hozircha umumiy bo'limlar yo'q</p>
        </div>
      </div>
    </div>

    <div class="section-label">🗂️ Mening bo'limlarim</div>
    <div class="folder-grid" id="my-folders">
      <div class="empty-state" id="empty-msg">
        <div class="emoji">✨</div>
        <p>Hali bo'lim yo'q. Birinchi bo'limingizni yarating!</p>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Yangi bo'lim yaratish</h3>
      <div class="form-group">
        <label>Bo'lim nomi</label>
        <input type="text" id="folder-name" placeholder="Masalan: Mevalar, Hayvonlar..." />
      </div>
      <div class="form-group">
        <label>Emoji (ixtiyoriy)</label>
        <input type="text" id="folder-emoji" placeholder="🍎" maxlength="2" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Bekor qilish</button>
        <button class="btn-confirm" onclick="createFolder()">Yaratish</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, addDoc, getDocs, deleteDoc, doc, getDoc, setDoc, query, where, orderBy, limit, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const ADMIN_EMAIL = "abdurasul1406z@gmail.com";
    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = 'index.html';
      currentUser = user;
      document.getElementById('user-email').textContent = user.email;
      const letter = (user.displayName || user.email).charAt(0).toUpperCase();

      // Avatar: Firestore dan rasm yuklaymiz
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().photoBase64) {
          const b64 = userDoc.data().photoBase64;
          document.getElementById('avatar-text').innerHTML = `<img src="${b64}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;" />`;
          document.getElementById('avatar-text-lg').innerHTML = `<img src="${b64}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;" />`;
        } else {
          document.getElementById('avatar-text').textContent = letter;
          document.getElementById('avatar-text-lg').textContent = letter;
        }
      } catch(e) {
        document.getElementById('avatar-text').textContent = letter;
        document.getElementById('avatar-text-lg').textContent = letter;
      }

      document.getElementById('user-name').textContent = user.displayName || user.email;
      document.getElementById('greeting-name').textContent = user.displayName?.split(' ')[0] || 'Foydalanuvchi';

      if (user.email === ADMIN_EMAIL) {
        document.getElementById('admin-section').style.display = 'block';
        const adminBtn = document.getElementById('admin-btn-wrap');
        if (adminBtn) adminBtn.style.display = 'block';
      }

      // Foydalanuvchi ma'lumotlarini Firestoreda yangilash (displayName, email)
      try {
        await setDoc(doc(db, 'users', user.uid), {
          displayName: user.displayName || '',
          email: user.email || '',
        }, { merge: true });
      } catch(e) {}

      await loadUserStats(user.uid);
      await loadFolders();
      await loadAnnouncements();
    });

    async function loadAnnouncements() {
      try {
        const snap = await getDocs(
          query(collection(db, 'announcements'), orderBy('createdAt', 'desc'), limit(5))
        );
        const banner = document.getElementById('announce-banner');
        if (!banner) return;
        banner.innerHTML = '';
        if (snap.empty) return;

        const typeClass = {
          '🎉': 'type-yangilik',
          '⚠️': 'type-ogohlantirish',
          '🎁': 'type-sovga',
          '🔔': 'type-eslatma',
          '🚀': 'type-yangilanish',
        };

        snap.forEach(d => {
          const data = d.data();
          const cls = typeClass[data.emoji] || 'type-yangilik';
          const div = document.createElement('div');
          div.className = `announce-item-banner ${cls}`;
          div.innerHTML = `
            <span class="announce-emoji">${data.emoji || '📢'}</span>
            <span>${data.text}</span>
            <button class="announce-close" onclick="this.parentElement.remove()" title="Yopish">✕</button>
          `;
          banner.appendChild(div);
        });
      } catch(e) {}
    }

    async function loadUserStats(uid) {
      try {
        const userDoc = await getDoc(doc(db, 'users', uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          document.getElementById('nav-stars').textContent = data.stars || 0;
          document.getElementById('nav-coins').textContent = data.coins || 0;
        }
      } catch(e) {}
    }

    async function loadFolders() {
      const myQ = query(
        collection(db, 'folders'),
        where('uid', '==', currentUser.uid),
        where('isAdmin', '==', false)
      );
      const mySnap = await getDocs(myQ);

      // Dropdown statistikani yangilash
      let totalWords = 0;
      mySnap.forEach(d => totalWords += d.data().wordCount || 0);
      const statsEl = document.getElementById('profileStats');
      if (statsEl) statsEl.innerHTML = `📚 ${mySnap.size} bo'lim &nbsp;·&nbsp; 📝 ${totalWords} so'z`;

      renderFolders(mySnap, 'my-folders', false);

      const adminQ = query(collection(db, 'folders'), where('isAdmin', '==', true));
      const adminSnap = await getDocs(adminQ);
      if (!adminSnap.empty) {
        document.getElementById('admin-section').style.display = 'block';
        renderFolders(adminSnap, 'admin-folders', true);
      }
    }

    function renderFolders(snap, containerId, isAdminSection) {
      const container = document.getElementById(containerId);
      if (snap.empty) {
        if (containerId === 'my-folders') {
          container.innerHTML = `
            <div class="empty-state" id="empty-msg">
              <div class="emoji">✨</div>
              <p>Hali bo'lim yo'q. Birinchi bo'limingizni yarating!</p>
            </div>`;
        }
        return;
      }

      container.innerHTML = '';
      snap.forEach(docSnap => {
        const data = docSnap.data();
        const id = docSnap.id;
        const canDelete = !isAdminSection || currentUser.email === ADMIN_EMAIL;

        // Reyting badge
        const scoreBadge = data.lastScore
          ? `<div class="score-badge">⭐ ${data.lastScore}</div>`
          : '';

        const card = document.createElement('div');
        card.className = 'folder-card';
        card.innerHTML = `
          <div class="folder-icon">${data.emoji || '📁'}</div>
          <div class="folder-name">${data.name}</div>
          <div class="folder-meta">${data.wordCount || 0} ta so'z</div>
          ${scoreBadge}
          <div class="folder-progress">
            <div class="folder-progress-bar" style="width:${data.progress || 0}%"></div>
          </div>
          ${canDelete ? `<div class="folder-actions">
            <button class="icon-btn" onclick="deleteFolder(event, '${id}')">🗑</button>
          </div>` : ''}
        `;
        card.addEventListener('click', () => {
          window.location.href = `folder.html?id=${id}`;
        });
        container.appendChild(card);
      });
    }

    window.openModal = () => {
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('folder-name').focus(), 100);
    };

    window.closeModal = () => {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('folder-name').value = '';
      document.getElementById('folder-emoji').value = '';
    };

    window.createFolder = async () => {
      const name = document.getElementById('folder-name').value.trim();
      const emoji = document.getElementById('folder-emoji').value.trim() || '📁';
      if (!name) return;

      // ── DUPLIKAT BO'LIM TEKSHIRUVI ──
      const existingQ = query(
        collection(db, 'folders'),
        where('uid', '==', currentUser.uid),
        where('isAdmin', '==', false)
      );
      const existingSnap = await getDocs(existingQ);
      const duplicate = [...existingSnap.docs].find(
        d => d.data().name.toLowerCase() === name.toLowerCase()
      );
      if (duplicate) {
        showToast(`"${name}" nomli bo'lim allaqachon mavjud! ❌`, true);
        return;
      }

      await addDoc(collection(db, 'folders'), {
        name,
        emoji,
        uid: currentUser.uid,
        isAdmin: false,
        wordCount: 0,
        progress: 0,
        lastScore: null,
        createdAt: serverTimestamp()
      });

      closeModal();
      showToast("Bo'lim yaratildi! 🎉");
      await loadFolders();
    };

    window.deleteFolder = async (e, id) => {
      e.stopPropagation();
      if (!confirm("Bu bo'limni o'chirasizmi?")) return;
      await deleteDoc(doc(db, 'folders', id));
      showToast("Bo'lim o'chirildi", true);
      await loadFolders();
    };

    window.logout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    
    const avatar = document.getElementById('profile-avatar');
    const dropdown = document.getElementById('profile-dropdown');

    avatar?.addEventListener('click', () => {
      dropdown.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.nav-user')) {
        dropdown.classList.remove('open');
      }
    });

document.getElementById('folder-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.createFolder();
    });
  </script>
</body>
</html>
