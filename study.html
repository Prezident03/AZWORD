<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Mashq</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .study-wrap { max-width: 680px; margin: 0 auto; padding: 36px 24px; }

    .study-progress { margin-bottom: 28px; }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label { font-size: 0.82rem; color: var(--text-muted); }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-main), var(--rose));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--purple-light);
      margin-bottom: 20px;
    }

    .study-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .word-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    .word-sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 6px; }
    .word-example-text {
      font-size: 0.875rem;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 8px;
    }

    .intro-translation {
      font-size: 1.1rem;
      color: var(--purple-light);
      font-weight: 600;
    }

    .example-wrap {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .translate-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .translate-btn:hover { border-color: var(--purple-main); color: var(--purple-light); }
    .translate-btn:disabled { opacity: 0.5; cursor: default; }

    .example-translation {
      font-size: 0.85rem;
      color: var(--purple-light);
      font-style: italic;
      background: var(--purple-glow);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 8px;
      padding: 8px 14px;
      max-width: 100%;
    }

    /* Stage 2 */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-top: 24px;
    }

    .option-btn {
      padding: 14px 16px;
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      text-align: center;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--purple-main); background: var(--bg-hover); }
    .option-btn.correct { border-color: var(--success); background: rgba(52,211,153,0.12); color: var(--success); }
    .option-btn.wrong { border-color: var(--danger); background: rgba(248,113,113,0.12); color: var(--danger); }

    /* Stage 3 */
    .pieces-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
      width: 100%;
    }

    .piece-btn {
      padding: 10px 18px;
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .piece-btn:hover:not(.used) { border-color: var(--purple-main); }
    .piece-btn.used { opacity: 0.3; cursor: default; }

    .assembled-word {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--purple-light);
      min-height: 50px;
      margin-top: 16px;
      letter-spacing: 2px;
    }

    /* Stage 4 */
    .match-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: 16px;
    }
    .match-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .match-col { display: flex; flex-direction: column; gap: 10px; }
    .match-btn {
      padding: 12px 16px;
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      text-align: center;
      width: 100%;
    }
    .match-btn:hover:not(.matched):not(.wrong-match) { border-color: var(--purple-main); }
    .match-btn.selected { border-color: var(--purple-light); background: var(--purple-glow); color: var(--purple-light); }
    .match-btn.matched { border-color: var(--success); background: rgba(52,211,153,0.1); color: var(--success); opacity: 0.7; cursor: default; }
    .match-btn.wrong-match { border-color: var(--danger); background: rgba(248,113,113,0.1); }

    /* Stage 5 */
    .type-input {
      width: 100%;
      background: var(--bg-deep);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-size: 1.2rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      text-align: center;
      outline: none;
      margin-top: 20px;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }
    .type-input:focus { border-color: var(--purple-main); }
    .type-input.correct-input { border-color: var(--success); }
    .type-input.wrong-input { border-color: var(--danger); }

    /* Stage 6 */
    .sentence-input {
      width: 100%;
      background: var(--bg-deep);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-top: 20px;
      resize: none;
      height: 100px;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    .sentence-input:focus { border-color: var(--purple-main); }

    .ai-feedback {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      line-height: 1.6;
      text-align: left;
      display: none;
    }
    .ai-feedback.good { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--success); }
    .ai-feedback.bad { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }

    /* Feedback overlay */
    .feedback-overlay {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 3rem;
      font-weight: 700;
      display: none;
    }
    .feedback-overlay.show { display: flex; }
    .feedback-overlay.correct-ov { background: rgba(52,211,153,0.15); }
    .feedback-overlay.wrong-ov { background: rgba(248,113,113,0.15); }
    .feedback-overlay p { font-size: 1rem; font-weight: 600; }

    .hint-text { font-size: 0.8rem; color: var(--text-dim); margin-top: 10px; }

    /* 🔊 Audio button */
    .speak-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 9px 20px;
      background: rgba(124,58,237,0.1);
      border: 1.5px solid rgba(124,58,237,0.3);
      border-radius: 99px;
      color: var(--purple-light);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .speak-btn:hover { background: var(--purple-glow); border-color: var(--purple-main); }
    .speak-btn.speaking {
      background: var(--purple-glow);
      border-color: var(--purple-main);
      animation: pulse-speak 1s infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 640px) {
      .study-wrap { padding: 12px; }
      .progress-area { padding: 0 0 14px; }
      .study-card { padding: 22px 16px; min-height: 240px; }
      .word-display { font-size: 2rem; }
      .choice-grid { grid-template-columns: 1fr; gap: 8px; }
      .nav-actions { gap: 8px; }
      .nav-actions button { padding: 12px 16px; font-size: 0.85rem; }
      .pieces-area { gap: 6px; }
      .piece-btn { padding: 8px 12px; font-size: 0.9rem; }
      .stage-badge { font-size: 0.78rem; padding: 5px 12px; }
      .type-input { font-size: 0.95rem; padding: 12px; }
    }

    .undo-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 8px 18px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .undo-btn:hover { border-color: var(--warning); color: var(--warning); }

    .study-nav {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-next {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-next:hover { opacity: 0.88; }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-skip {
      padding: 14px 20px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-skip:hover { border-color: var(--text-muted); color: var(--text-main); }

    .loading-dots { display: inline-flex; gap: 5px; margin-left: 8px; }
    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple-light);
      animation: dot-bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    @media (max-width: 500px) {
      .study-card { padding: 24px 18px; }
      .word-display { font-size: 1.8rem; }
      .options-grid { grid-template-columns: 1fr; }
      .match-area { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">AzWord</div>
    <div class="nav-user">
      <button class="btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
    </div>
  </nav>

  <div class="study-wrap">
    <div class="study-progress">
      <div class="progress-top">
        <span class="progress-label" id="progress-text">So'z 1 / 1</span>
        <span class="progress-label" id="stage-text">1-bosqich</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="stage-badge" id="stage-badge">📖 Tanishish</div>

    <div class="study-card" id="study-card">
      <div style="color:var(--text-muted)">Yuklanmoqda...</div>
    </div>

    <div class="study-nav">
      <button class="btn-skip" id="skip-btn" onclick="skipWord()">O'tkazib yuborish</button>
      <button class="btn-next" id="next-btn" onclick="nextAction()">Davom etish →</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  // ── SOUND EFFECTS (Web Audio API) ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let _ctx = null;

  function getCtx() {
    if (!_ctx) _ctx = new AudioCtx();
    return _ctx;
  }

  window.playSound = function(type) {
    try {
      const ctx = getCtx();

      if (type === 'correct') {
        // Yumshoq "ding" - to'g'ri javob
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(880, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.3);

      } else if (type === 'wrong') {
        // Xato tovushi
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(300, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.2);

      } else if (type === 'coin') {
        // Tanga tovushi - ikki nota
        [0, 0.08].forEach((delay, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(i === 0 ? 1047 : 1319, ctx.currentTime + delay);
          g.gain.setValueAtTime(0.25, ctx.currentTime + delay);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
          o.start(ctx.currentTime + delay);
          o.stop(ctx.currentTime + delay + 0.25);
        });

      } else if (type === 'victory') {
        // Victory - 4 nota fanfar
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
          g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
          o.start(ctx.currentTime + i * 0.12);
          o.stop(ctx.currentTime + i * 0.12 + 0.3);
        });

      } else if (type === 'achievement') {
        // Achievement - yuqori nota + reverb effekti
        const notes = [784, 988, 1175, 1568];
        notes.forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = i < 3 ? 'sine' : 'triangle';
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
          g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.5);
          o.start(ctx.currentTime + i * 0.1);
          o.stop(ctx.currentTime + i * 0.1 + 0.5);
        });

      } else if (type === 'click') {
        // Kichkina click
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(600, ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.08);
      }
    } catch(e) {}
  };
</script>
  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, getDocs, query, orderBy, doc, setDoc, updateDoc, increment, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const STAGES = [
      { id: 1, name: "Tanishish",    emoji: "📖" },
      { id: 2, name: "Variantlar",   emoji: "🔤" },
      { id: 3, name: "Bo'laklash",   emoji: "🧩" },
      { id: 4, name: "Moslashtirish",emoji: "🔗" },
      { id: 5, name: "Yozish",       emoji: "✍️" },
    ];

    const params = new URLSearchParams(window.location.search);
    const folderId = params.get('id');
    if (!folderId) window.location.href = 'dashboard.html';

    let words = [];
    // Yangi logika: bosqich bo'yicha barcha so'zlar
    // currentStage: 1-6, currentWordIndex: joriy so'z indeksi (bosqich ichida)
    let currentStage = 1;
    let currentWordIndex = 0;
    let results = {}; // wordId -> { en, uz, mistakes: [] }
    let currentUser = null;

    // Matching state
    let matchSelected = null;
    let matchedPairs = 0;

    // Piece state
    let pieces = [];
    let assembled = '';
    let assembledPieces = [];

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = 'index.html';
      currentUser = user;
      await loadWords();
    });

    async function loadWords() {
      const q = query(collection(db, 'folders', folderId, 'words'), orderBy('createdAt', 'asc'));
      const snap = await getDocs(q);
      words = [];
      snap.forEach(d => words.push({ id: d.id, ...d.data() }));

      if (words.length === 0) {
        window.location.href = `folder.html?id=${folderId}`;
        return;
      }

      words.forEach(w => { results[w.id] = { en: w.en, uz: w.uz, mistakes: [] }; });
      renderStage();
    }

    function updateProgress() {
      // Jami: 6 bosqich * N so'z
      // Stage 4 (moslashtirish) bitta boss bo'ladi, shuning uchun uni alohida hisoblash
      const totalSteps = words.length * 6;
      // Stage 4 da 1 ta qadam (barcha so'zlar uchun bitta matching)
      let doneSteps;
      if (currentStage < 4) {
        doneSteps = (currentStage - 1) * words.length + currentWordIndex;
      } else if (currentStage === 4) {
        doneSteps = 3 * words.length; // 1,2,3 bosqichlar tugagan
      } else {
        doneSteps = (currentStage - 1) * words.length + currentWordIndex;
      }
      const pct = Math.round((doneSteps / totalSteps) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';

      if (currentStage === 4) {
        document.getElementById('progress-text').textContent = `Moslashtirish`;
      } else {
        document.getElementById('progress-text').textContent = `So'z ${currentWordIndex + 1} / ${words.length}`;
      }
      document.getElementById('stage-text').textContent = `${currentStage}-bosqich`;
      const s = STAGES[currentStage - 1];
      document.getElementById('stage-badge').textContent = `${s.emoji} ${s.name}`;
    }

    function renderStage() {
      updateProgress();
      const card = document.getElementById('study-card');
      const nextBtn = document.getElementById('next-btn');
      nextBtn.textContent = 'Davom etish →';
      nextBtn.disabled = false;
      nextBtn.onclick = () => nextAction();

      if (currentStage === 1) renderStage1(words[currentWordIndex], card);
      else if (currentStage === 2) renderStage2(words[currentWordIndex], card);
      else if (currentStage === 3) renderStage3(words[currentWordIndex], card);
      else if (currentStage === 4) renderStage4(card);
      else if (currentStage === 5) renderStage5(words[currentWordIndex], card);
    }

    // ── STAGE 1: Tanishtirish — barcha so'zlar ──
    function renderStage1(word, card) {
      const exStr = word.example ? word.example.replace(/\\/g, '\\\\').replace(/'/g, "\\'") : '';
      card.innerHTML = `
        <div class="word-display">${word.en}</div>
        <div class="intro-translation">${word.uz}</div>
        <button class="speak-btn" id="speak-btn" onclick="speakWord('${word.en.replace(/'/g, "\\'")}')">
          🔊 Tinglash
        </button>
        ${word.example ? `
          <div class="example-wrap">
            <div class="word-example-text" id="example-text">"${word.example}"</div>
            <button class="translate-btn" id="translate-btn" onclick="translateExample('${exStr}')">
              🌐 Tarjima
            </button>
            <div class="example-translation" id="example-translation" style="display:none"></div>
          </div>
        ` : ''}
      `;
      document.getElementById('next-btn').textContent = "Tushundim →";

      // Avtomatik o'qib berish
      setTimeout(() => speakWord(word.en), 600);
    }

    // ── TEXT-TO-SPEECH ──
    // Ovozlar ro'yxati
    let gbVoice = null;
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      gbVoice = voices.find(v =>
        v.lang === 'en-GB' ||
        v.name.includes('British') ||
        v.name.includes('Daniel') ||
        v.name.includes('Kate') ||
        v.name.includes('Serena') ||
        v.name.includes('Arthur') ||
        v.name.includes('Oliver')
      ) || voices.find(v => v.lang.startsWith('en-GB'))
        || voices.find(v => v.lang.startsWith('en'));
    }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.speakWord = (text) => {
      playSound('click');
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();

      const btn = document.getElementById('speak-btn');
      if (btn) { btn.classList.add('speaking'); btn.innerHTML = '🔊 ...'; }

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-GB';
      utter.rate = 0.82;
      utter.pitch = 1;
      if (gbVoice) utter.voice = gbVoice;

      utter.onend = () => {
        if (btn) { btn.classList.remove('speaking'); btn.innerHTML = '🔊 Tinglash'; }
      };
      utter.onerror = () => {
        if (btn) { btn.classList.remove('speaking'); btn.innerHTML = '🔊 Tinglash'; }
      };

      window.speechSynthesis.speak(utter);
    };

    // ── TARJIMA (Stage 1) ──
    window.translateExample = async (sentence) => {
      const btn = document.getElementById('translate-btn');
      const translationEl = document.getElementById('example-translation');
      if (!btn || !translationEl) return;

      btn.disabled = true;
      btn.textContent = '⏳ ...';

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: `Translate this English sentence to Uzbek. Reply ONLY with the translation, nothing else:\n"${sentence}"` })
        });
        const data = await res.json();
        const translation = (data.choices?.[0]?.message?.content || '').trim().replace(/^["'"]|["'"]$/g, '');
        translationEl.textContent = '🇺🇿 ' + translation;
        translationEl.style.display = 'block';
        btn.style.display = 'none';
      } catch(e) {
        btn.disabled = false;
        btn.textContent = '🌐 Tarjima';
      }
    };

    // ── STAGE 2: Variantlar — barcha so'zlar ──
    function renderStage2(word, card) {
      const opts = generateOptions(word, 'en', 4);
      card.innerHTML = `
        <div class="word-sub">Quyidagi so'zning inglizcha tarjimasini toping:</div>
        <div class="word-display">${word.uz}</div>
        <div class="options-grid" id="opts-grid">
          ${opts.map(o => `<button class="option-btn" onclick="checkOption(this, '${o}', '${word.en}')">${o}</button>`).join('')}
        </div>
      `;
      document.getElementById('next-btn').disabled = true;
    }

    window.checkOption = (btn, selected, correct) => {
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      if (selected === correct) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.option-btn').forEach(b => {
          if (b.textContent === correct) b.classList.add('correct');
        });
        markMistake(2);
      }
      document.getElementById('next-btn').disabled = false;
    };

    function generateOptions(word, field, count) {
      const correct = word[field];
      const others = words.filter(w => w.id !== word.id).map(w => w[field]);
      const shuffled = others.sort(() => Math.random() - 0.5).slice(0, count - 1);
      return [...shuffled, correct].sort(() => Math.random() - 0.5);
    }

    // ── STAGE 3: Bo'laklash — barcha so'zlar ──
    function renderStage3(word, card) {
      const en = word.en.toLowerCase();
      pieces = splitWord(en);
      assembled = '';
      assembledPieces = [];

      card.innerHTML = `
        <div class="word-sub">Bu so'zni to'g'ri yig'ing:</div>
        <div class="word-display" style="font-size:1.1rem;color:var(--text-muted)">${word.uz}</div>
        <div class="assembled-word" id="assembled-display">_</div>
        <div class="pieces-area" id="pieces-area">
          ${pieces.map((p, i) => `<button class="piece-btn" id="piece-${i}" onclick="addPiece(${i}, '${p}', '${en}')">${p}</button>`).join('')}
        </div>
        <button class="undo-btn" id="undo-btn" onclick="undoPiece()" style="display:none">↩ Orqaga</button>
      `;
      document.getElementById('next-btn').disabled = true;
    }

    function splitWord(word) {
      const len = word.length;
      let parts;
      if (len <= 4) {
        parts = [word[0], word.slice(1)];
      } else if (len <= 7) {
        const mid = Math.floor(len / 2);
        parts = [word.slice(0, mid), word.slice(mid)];
      } else {
        const p1 = Math.floor(len / 3);
        const p2 = Math.floor(len * 2 / 3);
        parts = [word.slice(0, p1), word.slice(p1, p2), word.slice(p2)];
      }
      // Bo'laklarni aralashtirish (shuffle)
      for (let i = parts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [parts[i], parts[j]] = [parts[j], parts[i]];
      }
      return parts;
    }

    window.addPiece = (idx, piece, correct) => {
      const btn = document.getElementById(`piece-${idx}`);
      if (btn.classList.contains('used')) return;
      btn.classList.add('used');
      assembled += piece;
      assembledPieces.push(idx);
      const display = document.getElementById('assembled-display');
      display.textContent = assembled;
      display.style.color = '';

      // Undo tugmasini ko'rsatish
      const undoBtn = document.getElementById('undo-btn');
      if (undoBtn) undoBtn.style.display = 'inline-flex';

      const allUsed = pieces.every((_, i) => document.getElementById(`piece-${i}`).classList.contains('used'));
      if (allUsed) {
        if (assembled === correct) {
          display.style.color = 'var(--success)';
          display.textContent = assembled + ' ✓';
          playSound('correct');
          if (undoBtn) undoBtn.style.display = 'none';
          document.getElementById('next-btn').disabled = false;
        } else {
          display.style.color = 'var(--danger)';
          display.textContent = assembled + ' ✗';
          playSound('wrong');
          markMistake(3);
          setTimeout(() => {
            assembled = '';
            assembledPieces = [];
            display.textContent = '_';
            display.style.color = '';
            if (undoBtn) undoBtn.style.display = 'none';
            pieces.forEach((_, i) => document.getElementById(`piece-${i}`).classList.remove('used'));
          }, 1200);
        }
      }
    };

    window.undoPiece = () => {
      if (assembledPieces.length === 0) return;
      const lastIdx = assembledPieces.pop();
      const lastPiece = pieces[lastIdx];
      assembled = assembled.slice(0, assembled.length - lastPiece.length);
      document.getElementById(`piece-${lastIdx}`).classList.remove('used');
      const display = document.getElementById('assembled-display');
      display.textContent = assembled || '_';
      display.style.color = '';
      const undoBtn = document.getElementById('undo-btn');
      if (undoBtn && assembledPieces.length === 0) undoBtn.style.display = 'none';
      document.getElementById('next-btn').disabled = true;
    };

    // ── STAGE 4: Moslashtirish — chap EN, o'ng UZ, har biri alohida qatorda ──
    function renderStage4(card) {
      matchSelected = null;
      matchedPairs = 0;

      const sample = words.slice(0, Math.min(words.length, 8));
      // EN va UZ larni alohida aralashtirish
      const enList = [...sample].sort(() => Math.random() - 0.5);
      const uzList = [...sample].sort(() => Math.random() - 0.5);

      // Chap va o'ng ustunni alohida ko'rsatamiz
      const rows = Math.max(enList.length, uzList.length);
      let rowsHtml = '';
      for (let i = 0; i < rows; i++) {
        const enWord = enList[i];
        const uzWord = uzList[i];
        rowsHtml += `<div class="match-row">`;
        if (enWord) {
          rowsHtml += `<button class="match-btn" data-word="${enWord.en}" data-side="en" onclick="selectMatch(this)">${enWord.en}</button>`;
        } else {
          rowsHtml += `<div></div>`;
        }
        if (uzWord) {
          rowsHtml += `<button class="match-btn" data-word="${uzWord.en}" data-side="uz" onclick="selectMatch(this)">${uzWord.uz}</button>`;
        } else {
          rowsHtml += `<div></div>`;
        }
        rowsHtml += `</div>`;
      }

      card.innerHTML = `
        <div class="word-sub" style="margin-bottom:8px">Inglizcha va o'zbekcha so'zlarni moslashtiring:</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;padding:0 4px">
          <div style="font-size:0.72rem;color:var(--text-dim);text-align:center;font-weight:600;letter-spacing:1px">🇬🇧 INGLIZCHA</div>
          <div style="font-size:0.72rem;color:var(--text-dim);text-align:center;font-weight:600;letter-spacing:1px">🇺🇿 O'ZBEKCHA</div>
        </div>
        <div class="match-area">${rowsHtml}</div>
      `;
      document.getElementById('next-btn').disabled = true;
    }

    window.selectMatch = (btn) => {
      if (btn.classList.contains('matched')) return;

      if (!matchSelected) {
        document.querySelectorAll('.match-btn.selected').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        matchSelected = btn;
        return;
      }

      if (matchSelected === btn) {
        btn.classList.remove('selected');
        matchSelected = null;
        return;
      }

      if (matchSelected.dataset.side === btn.dataset.side) {
        document.querySelectorAll('.match-btn.selected').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        matchSelected = btn;
        return;
      }

      if (matchSelected.dataset.word === btn.dataset.word) {
        matchSelected.classList.remove('selected');
        matchSelected.classList.add('matched');
        btn.classList.add('matched');
        matchSelected = null;
        matchedPairs++;

        const total = Math.min(words.length, 8);
        if (matchedPairs === total) {
          document.getElementById('next-btn').disabled = false;
          showToast("Hammasi to'g'ri! 🎉");
        }
      } else {
        matchSelected.classList.remove('selected');
        matchSelected.classList.add('wrong-match');
        btn.classList.add('wrong-match');
        // Stage 4 xatosini faqat bir marta belgilash
        markMistakeForAll(4);
        setTimeout(() => {
          matchSelected && matchSelected.classList.remove('wrong-match');
          btn.classList.remove('wrong-match');
          matchSelected = null;
        }, 700);
      }
    };

    // Stage 4 da barcha so'zlarga xato belgilash (1 xato = hamma xato emas, faqat xato qilinganlar)
    function markMistakeForAll(stage) {
      // Matching da aniq qaysi so'z xato qilingani bilinmaydi,
      // shuning uchun hozirgi tanlovni topamiz
      if (matchSelected) {
        const wordEn = matchSelected.dataset.word;
        const word = words.find(w => w.en === wordEn);
        if (word) markMistake(stage, word.id);
      }
    }

    // ── STAGE 5: Yozish — barcha so'zlar ──
    function renderStage5(word, card) {
      card.innerHTML = `
        <div class="word-sub">Quyidagi so'zni inglizcha yozing:</div>
        <div class="word-display">${word.uz}</div>
        ${word.example ? `<div class="word-example-text">"${word.example}"</div>` : ''}
        <input type="text" class="type-input" id="type-input" placeholder="inglizcha so'zni yozing..." autocomplete="off" autocorrect="off" spellcheck="false" />
        <div class="hint-text" id="type-hint"></div>
      `;
      document.getElementById('next-btn').disabled = true;

      const input = document.getElementById('type-input');
      input.focus();
      input.addEventListener('input', () => {
        const val = input.value.trim().toLowerCase();
        const correct = word.en.toLowerCase();
        if (val === correct) {
          input.classList.add('correct-input');
          document.getElementById('next-btn').disabled = false;
          document.getElementById('type-hint').textContent = "✓ To'g'ri!";
          document.getElementById('type-hint').style.color = 'var(--success)';
        } else {
          input.classList.remove('correct-input', 'wrong-input');
          document.getElementById('type-hint').textContent = '';
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkTyping(word);
      });
    }

    function checkTyping(word) {
      const input = document.getElementById('type-input');
      const val = input.value.trim().toLowerCase();
      if (val === word.en.toLowerCase()) {
        document.getElementById('next-btn').disabled = false;
      } else {
        input.classList.add('wrong-input');
        document.getElementById('type-hint').textContent = `To'g'ri: ${word.en}`;
        document.getElementById('type-hint').style.color = 'var(--danger)';
        markMistake(5);
        setTimeout(() => {
          input.classList.remove('wrong-input');
          input.value = '';
          document.getElementById('type-hint').textContent = '';
        }, 1500);
      }
    }



    // ── NAVIGATION ──
    window.nextAction = () => {
      goNext();
    };

    function goNext() {
      // 2-urinish rejimi: retryTasks bo'yicha bittadan ishlash
      if (isSecondRound && window._retryTasks) {
        window._retryIndex++;
        if (window._retryIndex >= window._retryTasks.length) {
          finishStudy();
          return;
        }
        renderRetryTask();
        return;
      }

      // Stage 4 (moslashtirish) bitta: keyingi bosqichga o'tamiz
      if (currentStage === 4) {
        currentStage = 5;
        currentWordIndex = 0;
        renderStage();
        return;
      }

      // Joriy bosqichda keyingi so'zga o'tamiz
      currentWordIndex++;
      if (currentWordIndex >= words.length) {
        // Bu bosqich tugadi, keyingi bosqichga
        currentStage++;
        currentWordIndex = 0;

        if (currentStage > 5) {
          finishStudy();
          return;
        }

        renderStage();
      } else {
        renderStage();
      }
    }

    function renderRetryTask() {
      const task = window._retryTasks[window._retryIndex];
      if (!task) { finishStudy(); return; }

      currentStage = task.stage;
      // words massivida ushbu so'zni topamiz
      const wordIdx = words.indexOf(task.word);
      currentWordIndex = wordIdx >= 0 ? wordIdx : 0;

      // Agar words massivida yo'q bo'lsa qo'shamiz
      if (wordIdx < 0) {
        words = [...(originalWords.length ? originalWords : words)];
        currentWordIndex = words.findIndex(w => w.id === task.word.id) || 0;
      }

      updateProgress();
      const card = document.getElementById('study-card');
      const nextBtn = document.getElementById('next-btn');
      nextBtn.textContent = 'Davom etish →';
      nextBtn.disabled = false;
      nextBtn.onclick = () => nextAction();

      if (task.stage === 1) renderStage1(task.word, card);
      else if (task.stage === 2) renderStage2(task.word, card);
      else if (task.stage === 3) renderStage3(task.word, card);
      else if (task.stage === 4) renderStage4(card);
      else if (task.stage === 5) renderStage5(task.word, card);
    }

    window.skipWord = () => {
      if (currentStage !== 4) markMistake(currentStage);
      goNext();
    };

    function markMistake(stage, wordId = null) {
      const id = wordId || words[currentWordIndex]?.id;
      if (!id || !results[id]) return;
      if (!results[id].mistakes.includes(stage)) {
        results[id].mistakes.push(stage);
      }
    }

    // ── FINISH ──
    let isSecondRound = false;
    let originalWords = [];

    async function finishStudy() {
      // 2-urinish: xato so'zlar va ularning xato bosqichlari
      if (!isSecondRound) {
        // Xato qilingan so'zlar va bosqichlarni topamiz
        const retryTasks = []; // { word, stage }
        for (const word of words) {
          const r = results[word.id];
          if (r && r.mistakes.length > 0) {
            r.mistakes.forEach(stage => {
              retryTasks.push({ word, stage });
            });
          }
        }

        if (retryTasks.length > 0) {
          isSecondRound = true;
          originalWords = [...words];

          // Xato bosqichlarni tartiblab qaytadan ishlash uchun saqlash
          window._retryTasks = retryTasks;
          window._retryIndex = 0;

          // Xato so'zlarning mistakes ni reset qilamiz (2-urinish uchun)
          retryTasks.forEach(({ word }) => {
            if (results[word.id]) results[word.id].mistakes = [];
          });

          showRoundBanner(retryTasks.length);
          return;
        }
      }

      // BUG FIX: avval sessionStorage, keyin redirect
      const allWords = isSecondRound ? originalWords : words;
      sessionStorage.setItem('studyResults', JSON.stringify(results));
      sessionStorage.setItem('studyWords', JSON.stringify(allWords));

      const perfectWords = Object.values(results).filter(r => r.mistakes.length === 0).length;
      const earnedStars = perfectWords;
      const earnedCoins = allWords.length;

      // 1. studyResults ga yozish
      try {
        await setDoc(
          doc(db, 'studyResults', `${currentUser.uid}_${folderId}_${Date.now()}`),
          {
            uid: currentUser.uid,
            folderId,
            completedAt: serverTimestamp(),
            totalWords: allWords.length,
            perfectWords,
            score: `${perfectWords}/${allWords.length}`
          }
        );
      } catch(e) { console.log('studyResults:', e); }

      // 2. Foydalanuvchiga stars va coins berish
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), {
          stars: increment(earnedStars),
          coins: increment(earnedCoins),
          weeklyStars: increment(earnedStars),
          lastSeen: serverTimestamp()
        });
      } catch(e) { console.log('stars/coins:', e); }

      // 3. Papka reytingini yangilash
      try {
        await updateDoc(doc(db, 'folders', folderId), {
          lastScore: `${perfectWords}/${allWords.length}`,
          lastStudied: serverTimestamp()
        });
      } catch(e) { console.log('folder:', e); }

      sessionStorage.setItem('earnedStars', earnedStars);
      sessionStorage.setItem('earnedCoins', earnedCoins);

      window.location.href = `results.html?id=${folderId}`;
    }

    function showRoundBanner(count) {
      const card = document.getElementById('study-card');
      if (card) {
        card.innerHTML = `
          <div style="text-align:center;padding:20px 10px;">
            <div style="font-size:3rem;margin-bottom:16px;">🔄</div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:10px;color:var(--text-main)">2-urinish!</div>
            <div style="color:var(--text-muted);font-size:0.9rem;">${count} ta xato bosqich qaytadan ishlanadi</div>
          </div>
        `;
      }
      document.getElementById('next-btn').disabled = true;
      setTimeout(() => {
        window._retryIndex = 0;
        renderRetryTask();
      }, 2200);
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
