<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Profil</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-page {
      max-width: 520px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 28px;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-main); }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }

    /* Header qism */
    .profile-header {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(157,92,246,0.15));
      padding: 36px 32px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .avatar-wrap {
      position: relative;
      width: 90px;
      margin: 0 auto 16px;
    }

    .avatar-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      border: 3px solid rgba(157,92,246,0.4);
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-edit-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--purple-main);
      border: 2px solid var(--bg-card);
      color: #fff;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .avatar-edit-btn:hover { background: var(--purple-light); }
    #photo-input { display: none; }

    .profile-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-header .email {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Stats */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      padding: 18px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--purple-light);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Body */
    .profile-body {
      padding: 28px 32px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .profile-field {
      margin-bottom: 14px;
    }

    .profile-field label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .profile-field input {
      width: 100%;
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .profile-field input:focus {
      border-color: var(--purple-main);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .profile-field input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .field-note {
      font-size: 0.74rem;
      color: var(--text-dim);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-save {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
      margin-top: 6px;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider-line {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .btn-password {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-password:hover {
      border-color: var(--purple-main);
      color: var(--purple-light);
    }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-logout:hover {
      background: rgba(248,113,113,0.08);
      border-color: var(--danger);
    }

    /* Password reset success */
    .reset-success {
      display: none;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--success);
      margin-top: 10px;
      text-align: center;
    }
    .reset-success.show { display: block; }

    /* Notification settings */
    .notif-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .notif-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .notif-toggle-label { font-size: 0.9rem; color: var(--text-muted); }
    .toggle-switch {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 99px;
      transition: 0.3s;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--purple-main); }
    .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(20px); }

    .time-picker-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .time-picker-row label { font-size: 0.85rem; color: var(--text-muted); flex: 1; }
    .time-input {
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 0.9rem;
      font-family: "Inter", sans-serif;
      outline: none;
      width: 110px;
    }
    .time-input:focus { border-color: var(--purple-main); }
    .notif-status {
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
    }
    .notif-status.on { background: rgba(52,211,153,0.08); color: var(--success); }
    .notif-status.off { background: rgba(139,127,184,0.08); color: var(--text-dim); }
    .notif-status.denied { background: rgba(248,113,113,0.08); color: var(--danger); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">AzWord</div>
    <div class="nav-user">
      <span id="nav-username">...</span>
    </div>
  </nav>

  <div class="profile-page">

    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      ← Orqaga
    </button>

    <div class="profile-card">

      <!-- Header -->
      <div class="profile-header">
        <div class="avatar-wrap">
          <div class="avatar-circle" id="avatar-circle">
            <span id="avatar-letter">A</span>
          </div>
          <div class="avatar-edit-btn" title="Rasm o'zgartirish" onclick="document.getElementById('photo-input').click()">📷</div>
        </div>
        <input type="file" id="photo-input" accept="image/*" onchange="uploadPhoto(this)" />
        <h2 id="profile-name">Yuklanmoqda...</h2>
        <div class="email" id="profile-email">—</div>
      </div>

      <!-- Stats -->
      <div class="profile-stats">
        <div class="stat-item">
          <div class="stat-num" id="stat-folders">0</div>
          <div class="stat-label">Bo'limlar</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-words">0</div>
          <div class="stat-label">So'zlar</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">AZ</div>
          <div class="stat-label">AzWord</div>
        </div>
      </div>

      <!-- Body -->
      <div class="profile-body">

        <div class="section-title">Shaxsiy ma'lumotlar</div>

        <div class="profile-field">
          <label>Ism Familiya</label>
          <input type="text" id="input-name" placeholder="Ismingizni kiriting" />
        </div>

        <div class="profile-field">
          <label>Gmail (o'zgartirib bo'lmaydi)</label>
          <input type="email" id="input-email" disabled />
          <div class="field-note">🔒 Email Firebase orqali boshqariladi</div>
        </div>

        <button class="btn-save" id="btn-save" onclick="saveName()">
          💾 Saqlash
        </button>

        <div class="divider-line"></div>

        <div class="section-title">Parolni o'zgartirish</div>

        <button class="btn-password" onclick="resetPassword()">
          🔑 Parolni o'zgartirish
        </button>

        <div class="reset-success" id="reset-success">
          ✅ Emailingizga parolni tiklash havolasi yuborildi!
        </div>

        <div class="divider-line"></div>

        <div class="notif-section-title">🔔 Eslatma sozlamalari</div>

        <div id="notif-status-box" class="notif-status off">
          Yuklanmoqda...
        </div>

        <div class="notif-toggle-row">
          <span class="notif-toggle-label">Kunlik eslatma</span>
          <label class="toggle-switch">
            <input type="checkbox" id="notif-toggle" onchange="toggleNotification(this.checked)"/>
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <div class="time-picker-row" id="time-picker-row" style="display:none">
          <label>Eslatma vaqti</label>
          <input type="time" id="notif-time" class="time-input" value="19:00" onchange="saveNotifTime(this.value)"/>
        </div>

        <div class="divider-line"></div>

        <button class="btn-logout" onclick="logoutUser()">
          🚪 Hisobdan chiqish
        </button>

      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import {
      onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, getDocs, query, where, doc, setDoc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = 'index.html';
      currentUser = user;

      const name = user.displayName || '';
      const email = user.email || '';
      const letter = (name || email).charAt(0).toUpperCase();

      document.getElementById('nav-username').textContent = name || email;
      document.getElementById('profile-name').textContent = name || 'Foydalanuvchi';
      document.getElementById('profile-email').textContent = email;
      document.getElementById('input-name').value = name;
      document.getElementById('input-email').value = email;

      // Avatar: Firestore dan rasm yuklaymiz
      const avatarCircle = document.getElementById('avatar-circle');
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().photoBase64) {
          const base64 = userDoc.data().photoBase64;
          avatarCircle.innerHTML = `<img src="${base64}" alt="avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />`;
        } else {
          document.getElementById('avatar-letter').textContent = letter;
        }
      } catch(e) {
        document.getElementById('avatar-letter').textContent = letter;
      }

      // Statistika
      try {
        const snap = await getDocs(query(
          collection(db, 'folders'),
          where('uid', '==', user.uid)
        ));
        // isAdmin ni client-side filtrlaymiz (composite index talab qilmasligi uchun)
        let folderCount = 0;
        let totalWords = 0;
        snap.forEach(d => {
          const data = d.data();
          if (!data.isAdmin) {
            folderCount++;
            totalWords += data.wordCount || 0;
          }
        });
        document.getElementById('stat-folders').textContent = folderCount;
        document.getElementById('stat-words').textContent = totalWords;
      } catch(e) {}
    });

    window.saveName = async () => {
      const newName = document.getElementById('input-name').value.trim();
        if (!newName) return showToast("Ism bosh bolmasin!", true);

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saqlanmoqda...';

      try {
        await updateProfile(currentUser, { displayName: newName });
        document.getElementById('profile-name').textContent = newName;
        document.getElementById('nav-username').textContent = newName;
        document.getElementById('avatar-letter').textContent = newName.charAt(0).toUpperCase();
        showToast('Ism saqlandi! ✅');
      } catch(e) {
        showToast('Xato yuz berdi', true);
      }

      btn.disabled = false;
      btn.textContent = '💾 Saqlash';
    };

    window.resetPassword = async () => {
      try {
        await sendPasswordResetEmail(auth, currentUser.email);
        document.getElementById('reset-success').classList.add('show');
        showToast('Emailga yuborildi! 📧');
      } catch(e) {
        showToast('Xato yuz berdi', true);
      }
    };

    window.uploadPhoto = async (input) => {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 1024 * 1024) return showToast("Rasm 1MB dan kichik bo'lsin!", true);

      const avatarCircle = document.getElementById('avatar-circle');
      avatarCircle.style.opacity = '0.5';
      showToast('Yuklanmoqda...');

      // Rasmni kichraytirish (max 200x200)
      const reader = new FileReader();
      reader.onload = async (e) => {
        const img = new Image();
        img.onload = async () => {
          const canvas = document.createElement('canvas');
          const MAX = 200;
          let w = img.width, h = img.height;
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const base64 = canvas.toDataURL('image/jpeg', 0.7);

          try {
            // Firestorega saqlash (photoURL limit yo'q)
            await setDoc(doc(db, 'users', currentUser.uid), {
              photoBase64: base64,
              updatedAt: new Date()
            }, { merge: true });

            avatarCircle.innerHTML = `<img src="${base64}" alt="avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />`;
            avatarCircle.style.opacity = '1';
            showToast('Rasm saqlandi! ✅');
          } catch(err) {
            avatarCircle.style.opacity = '1';
            showToast('Xato: ' + err.message, true);
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.logoutUser = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    // ── NOTIFICATION SOZLAMALARI ──
    function initNotifUI() {
      const statusBox = document.getElementById('notif-status-box');
      const toggle = document.getElementById('notif-toggle');
      const timeRow = document.getElementById('time-picker-row');
      const timeInput = document.getElementById('notif-time');

      if (!("Notification" in window)) {
        statusBox.className = 'notif-status denied';
        statusBox.textContent = 'Brauzeringiz notification qollab-quvvatlamaydi';
        return;
      }

      const enabled = localStorage.getItem('notif-enabled') === 'true';
      const savedTime = localStorage.getItem('notif-time') || '19:00';
      timeInput.value = savedTime;

      if (Notification.permission === 'denied') {
        statusBox.className = 'notif-status denied';
        statusBox.textContent = 'Brauzer ruxsati rad etilgan. Brauzer sozlamalaridan yoqing.';
        toggle.disabled = true;
        return;
      }

      if (enabled && Notification.permission === 'granted') {
        statusBox.className = 'notif-status on';
        statusBox.textContent = `Eslatma yoqilgan — har kuni soat ${savedTime} da`;
        toggle.checked = true;
        timeRow.style.display = 'flex';
      } else {
        statusBox.className = 'notif-status off';
        statusBox.textContent = "Eslatma ochirilgan";
        toggle.checked = false;
        timeRow.style.display = 'none';
      }
    }

    window.toggleNotification = async checked => {
      const statusBox = document.getElementById('notif-status-box');
      const timeRow = document.getElementById('time-picker-row');
      const savedTime = localStorage.getItem('notif-time') || '19:00';

      if (checked) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          localStorage.setItem('notif-enabled', 'true');
          statusBox.className = 'notif-status on';
          statusBox.textContent = `Eslatma yoqilgan — har kuni soat ${savedTime} da`;
          timeRow.style.display = 'flex';
          showToast('Eslatma yoqildi! 🔔');
        } else {
          document.getElementById('notif-toggle').checked = false;
          statusBox.className = 'notif-status denied';
          statusBox.textContent = 'Ruxsat berilmadi';
          showToast('Ruxsat berilmadi', true);
        }
      } else {
        localStorage.removeItem('notif-enabled');
        localStorage.setItem('notif-dismissed', 'true');
        statusBox.className = 'notif-status off';
        statusBox.textContent = "Eslatma ochirilgan";
        timeRow.style.display = 'none';
        showToast("Eslatma ochirildi");
      }
    };

    window.saveNotifTime = time => {
      localStorage.setItem('notif-time', time);
      const statusBox = document.getElementById('notif-status-box');
      statusBox.textContent = `Eslatma yoqilgan — har kuni soat ${time} da`;
      showToast(`Vaqt saqlandi: ${time} ✅`);
    };

    // Auth tayyor bo'lgandan keyin chaqiramiz
    setTimeout(initNotifUI, 500);

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
