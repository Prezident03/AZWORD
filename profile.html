<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | AzWord</title>
    <style>
        :root {
            --primary: #7c3aed;
            --bg: #0f0d1a;
            --card: #1a1628;
            --border: #2e2845;
        }
        body { background: #050508; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .profile-wrap { max-width: 500px; margin: 50px auto; padding: 20px; }
        .profile-card { 
            background: rgba(26, 22, 40, 0.7); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px; padding: 40px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .avatar { 
            width: 100px; height: 100px; border-radius: 25px; 
            background: var(--primary); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }
        .statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .stat { background: var(--bg); padding: 15px; border-radius: 20px; }
        .stat b { font-size: 1.5em; color: var(--primary); }
        input { 
            width: 100%; padding: 15px; box-sizing: border-box;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 15px; color: white; margin-top: 10px;
        }
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 15px;
            background: var(--primary); color: white; cursor: pointer;
            margin-top: 10px; font-weight: bold; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="profile-wrap">
    <div class="profile-card">
        <div class="avatar" id="avatar">A</div>
        <h2 id="name">Yuklanmoqda...</h2>
        <p id="email" style="color: #888;"></p>

        <div class="statgrid">
            <div class="stat"><b id="folders">0</b><br><small>Papka</small></div>
            <div class="stat"><b id="words">0</b><br><small>So'z</small></div>
        </div>

        <input id="newName" placeholder="Yangi ismingiz">
        <button id="saveName">Ismni saqlash</button>
        <button id="resetPass" style="background: #333;">Parolni tiklash</button>

        <a href="dashboard.html" class="back-link">← Dashboardga qaytish</a>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.href = 'index.html'; return; }
        
        document.getElementById('name').textContent = user.displayName || 'Foydalanuvchi';
        document.getElementById('email').textContent = user.email;
        document.getElementById('avatar').textContent = (user.displayName || user.email)[0].toUpperCase();

        try {
            const snap = await getDocs(query(collection(db, 'folders'), where('uid', '==', user.uid)));
            document.getElementById('folders').textContent = snap.size;
            let totalWords = 0;
            snap.forEach(d => totalWords += (d.data().wordCount || 0));
            document.getElementById('words').textContent = totalWords;
        } catch (e) { console.error("Data fetch error", e); }

        document.getElementById('saveName').onclick = async () => {
            const n = document.getElementById('newName').value.trim();
            if (!n) return;
            await updateProfile(user, { displayName: n });
            alert('Ism muvaffaqiyatli o‘zgartirildi!');
            location.reload();
        };

        document.getElementById('resetPass').onclick = async () => {
            await sendPasswordResetEmail(auth, user.email);
            alert('Parolni tiklash uchun havolani emailingizdan tekshiring.');
        };
    });
</script>
</body>
</html>
