<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Bo'lim</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .folder-page { max-width: 900px; margin: 0 auto; padding: 36px 24px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 28px;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-main); }

    .folder-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 14px;
    }

    .folder-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .folder-title .fi { font-size: 2.2rem; }
    .folder-title h1 { font-size: 1.6rem; font-weight: 700; }
    .folder-title .word-count { color: var(--text-muted); font-size: 0.875rem; margin-top: 3px; }

    .header-actions { display: flex; gap: 10px; }

    /* Word list */
    .words-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .word-item {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .word-item:hover { border-color: var(--purple-main); }

    .word-left { flex: 1; }
    .word-en {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-main);
    }
    .word-uz {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .word-example {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }

    .word-num {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }

    .word-actions { display: flex; gap: 6px; }

    /* Start study btn */
    .btn-study {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-study:hover { opacity: 0.88; }
    .btn-study:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Empty */
    .words-empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
      border: 1.5px dashed var(--border);
      border-radius: 14px;
    }
    .words-empty .emoji { font-size: 2.5rem; margin-bottom: 12px; }

    .btn-upload {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: transparent;
      border: 1.5px solid var(--purple-main);
      color: var(--purple-light);
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-upload:hover { background: var(--purple-glow); }

    /* Modal: add word */
    .modal h3 { margin-bottom: 20px; font-size: 1.15rem; }

    .ai-example-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .ai-example-label {
      font-size: 0.72rem;
      color: var(--purple-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .ai-example-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
    }
    .ai-loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .ai-loading span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple-light);
      animation: dot-bounce 1.2s infinite;
    }
    .ai-loading span:nth-child(2) { animation-delay: 0.2s; }
    .ai-loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    @media (max-width: 640px) {
      .folder-header { flex-direction: column; align-items: flex-start; gap: 14px; }
      .header-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .btn-study { grid-column: 1 / -1; }
      .btn-ai-gen { grid-column: 1 / -1; }
      .word-item { padding: 12px 14px; }
      .word-num { display: none; }
    }

    /* AI Generator button */
    .btn-ai-gen {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(192,132,252,0.2));
      border: 1.5px solid rgba(124,58,237,0.5);
      color: var(--purple-light);
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: "Inter", sans-serif;
      transition: all 0.2s;
    }
    .btn-ai-gen:hover { background: var(--purple-glow); border-color: var(--purple-main); }
    .btn-ai-gen.locked { opacity: 0.5; cursor: not-allowed; }
    .btn-ai-gen .uses-badge {
      background: rgba(52,211,153,0.15);
      border: 1px solid rgba(52,211,153,0.3);
      color: #34d399;
      border-radius: 99px;
      padding: 1px 7px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* AI Generator modal */
    .ai-gen-modal { max-width: 500px; }
    .ai-gen-form { display: flex; flex-direction: column; gap: 12px; }
    .ai-gen-form input, .ai-gen-form select {
      width: 100%;
      background: var(--bg-deep);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text-main);
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .ai-gen-form input:focus, .ai-gen-form select:focus { border-color: var(--purple-main); }
    .ai-gen-progress {
      background: var(--bg-deep);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-top: 8px;
    }
    .ai-gen-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-main), var(--purple-light));
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s;
    }
    .ai-gen-result {
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 8px;
    }
    .ai-gen-word-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .ai-gen-word-row:last-child { border-bottom: none; }
    .ai-gen-word-row:hover { background: var(--bg-hover); }
    .agwr-en { font-weight: 600; min-width: 90px; font-family: "Space Grotesk", sans-serif; }
    .agwr-uz { color: var(--text-muted); flex: 1; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">AzWord</div>
    <div class="nav-user">
      <span id="user-name">...</span>
      <button class="btn-sm" onclick="logout()">Chiqish</button>
    </div>
  </nav>

  <div class="folder-page">

    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      ← Orqaga
    </button>

    <div class="folder-page-header">
      <div class="folder-title">
        <div class="fi" id="folder-emoji">📁</div>
        <div>
          <h1 id="folder-name">...</h1>
          <div class="word-count" id="word-count">0 ta so'z</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-ai-gen locked" id="ai-gen-btn" onclick="openAIGenModal()" title="AI bilan lugat yaratish">
          🤖 AI Generator
          <span class="uses-badge" id="ai-uses-badge">0</span>
        </button>
        <button class="btn-upload" onclick="goUpload()">📂 Fayl yuklash</button>
        <button class="btn-add" onclick="openAddModal()">＋ So'z qo'shish</button>
        <button class="btn-study" id="study-btn" onclick="startStudy()" disabled>▶ Mashq boshlash</button>
      </div>
    </div>

    <!-- So'zlar ro'yxati -->
    <div class="words-list" id="words-list">
      <div class="words-empty">
        <div class="emoji">📝</div>
        <p>Hali so'z yo'q. Birinchi so'zingizni qo'shing!</p>
      </div>
    </div>

  </div>

  <!-- Modal: So'z qo'shish -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h3>Yangi so'z qo'shish</h3>
      <div class="form-group">
        <label>Inglizcha so'z</label>
        <input type="text" id="word-en" placeholder="apple" />
      </div>
      <div class="form-group">
        <label>O'zbekcha tarjima</label>
        <input type="text" id="word-uz" placeholder="olma" />
      </div>
      <!-- AI misol gap -->
      <div class="ai-example-box" id="ai-example-box" style="display:none">
        <div class="ai-example-label">🤖 AI misol gap:</div>
        <div class="ai-example-text" id="ai-example-text"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Bekor qilish</button>
        <button class="btn-confirm" id="add-btn" onclick="addWord()">Qo'shish</button>
      </div>
    </div>
  </div>

  <!-- AI Generator Modal -->
  <div class="modal-overlay" id="ai-gen-modal">
    <div class="modal ai-gen-modal">
      <h3>🤖 AI Word Generator</h3>
      <div id="ai-gen-step1">
        <div class="ai-gen-form">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;font-weight:600">Mavzu (Topic)</label>
            <input type="text" id="ag-topic" placeholder="Medical, Animals, Business..." />
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;font-weight:600">Daraja</label>
            <select id="ag-level">
              <option value="A1">A1 - Boshlangich</option>
              <option value="A2">A2 - Elementary</option>
              <option value="B1" selected>B1 - Intermediate</option>
              <option value="B2">B2 - Upper-Intermediate</option>
              <option value="C1">C1 - Advanced</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;font-weight:600">Son</label>
            <select id="ag-count">
              <option value="10">10 ta</option>
              <option value="20" selected>20 ta</option>
              <option value="30">30 ta</option>
              <option value="50">50 ta</option>
            </select>
          </div>
        </div>
        <div style="margin-top:12px;font-size:0.78rem;color:var(--text-muted);display:flex;align-items:center;gap:6px">
          <span>⚡</span> Qolgan: <strong id="ag-uses-left" style="color:var(--success)">0</strong> marta
        </div>
        <div class="modal-actions" style="margin-top:14px">
          <button class="btn-cancel" onclick="closeAIGenModal()">Bekor</button>
          <button class="btn-confirm" id="ag-generate-btn" onclick="runAIGenerator()">Yaratish</button>
        </div>
      </div>
      <div id="ai-gen-step2" style="display:none">
        <div style="text-align:center;padding:8px 0 12px">
          <div id="ag-status" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:10px">Generatsiya qilinmoqda...</div>
          <div class="ai-gen-progress"><div class="ai-gen-progress-bar" id="ag-bar"></div></div>
        </div>
        <div class="ai-gen-result" id="ag-result" style="display:none"></div>
        <div class="modal-actions" style="margin-top:12px" id="ag-save-actions" style="display:none">
          <button class="btn-cancel" onclick="closeAIGenModal()">Yopish</button>
          <button class="btn-confirm" id="ag-save-btn" onclick="saveAIWords()">Hammasini qoshish</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      doc, getDoc, collection, addDoc, getDocs, deleteDoc,
      updateDoc, query, orderBy, serverTimestamp, increment, where
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const folderId = params.get('id');
    let currentUser = null;
    let words = [];

    if (!folderId) window.location.href = 'dashboard.html';

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = 'index.html';
      currentUser = user;
      document.getElementById('user-name').textContent = user.displayName || user.email;
      await loadFolder();
      await loadWords();
      await loadAIUses(user);
    });

    async function loadFolder() {
      const snap = await getDoc(doc(db, 'folders', folderId));
      if (!snap.exists()) return window.location.href = 'dashboard.html';
      const data = snap.data();
      document.getElementById('folder-emoji').textContent = data.emoji || '📁';
      document.getElementById('folder-name').textContent = data.name;
      document.title = `AzWord — ${data.name}`;
    }

    async function loadWords() {
      const q = query(collection(db, 'folders', folderId, 'words'), orderBy('createdAt', 'asc'));
      const snap = await getDocs(q);
      words = [];
      snap.forEach(d => words.push({ id: d.id, ...d.data() }));
      renderWords();
    }

    function renderWords() {
      const container = document.getElementById('words-list');
      const countEl = document.getElementById('word-count');
      const studyBtn = document.getElementById('study-btn');

      countEl.textContent = `${words.length} ta so'z`;
      studyBtn.disabled = words.length === 0;

      if (words.length === 0) {
        container.innerHTML = `
          <div class="words-empty">
            <div class="emoji">📝</div>
            <p>Hali so'z yo'q. Birinchi so'zingizni qo'shing!</p>
          </div>`;
        return;
      }

      container.innerHTML = '';
      words.forEach((w, i) => {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.innerHTML = `
          <div class="word-num">${i + 1}</div>
          <div class="word-left">
            <div class="word-en">${w.en}</div>
            <div class="word-uz">${w.uz}</div>
            ${w.example ? `<div class="word-example">"${w.example}"</div>` : ''}
          </div>
          <div class="word-actions">
            <button class="icon-btn" onclick="deleteWord('${w.id}')" title="O'chirish">🗑</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    let aiGeneratedExample = '';
    let aiDebounceTimer = null;

    window.openAddModal = () => {
      document.getElementById('add-modal').classList.add('open');
      setTimeout(() => document.getElementById('word-en').focus(), 100);
    };

    window.closeAddModal = () => {
      document.getElementById('add-modal').classList.remove('open');
      document.getElementById('word-en').value = '';
      document.getElementById('word-uz').value = '';
      document.getElementById('ai-example-box').style.display = 'none';
      document.getElementById('ai-example-text').innerHTML = '';
      aiGeneratedExample = '';
      clearTimeout(aiDebounceTimer);
    };

    // So'z kiritilganda AI avtomatik misol gap generatsiya qilsin
    document.getElementById('word-en').addEventListener('input', function() {
      const en = this.value.trim();
      const uz = document.getElementById('word-uz').value.trim();
      clearTimeout(aiDebounceTimer);
      if (en.length >= 2 && uz.length >= 1) {
        aiDebounceTimer = setTimeout(() => generateExample(en, uz), 800);
      }
    });

    document.getElementById('word-uz').addEventListener('input', function() {
      const en = document.getElementById('word-en').value.trim();
      const uz = this.value.trim();
      clearTimeout(aiDebounceTimer);
      if (en.length >= 2 && uz.length >= 1) {
        aiDebounceTimer = setTimeout(() => generateExample(en, uz), 800);
      }
    });

    async function generateExample(en, uz) {
      const box = document.getElementById('ai-example-box');
      const textEl = document.getElementById('ai-example-text');
      box.style.display = 'block';
      textEl.innerHTML = '<span class="ai-loading"><span></span><span></span><span></span></span>';
      aiGeneratedExample = '';

      try {
        const prompt = `Write ONE simple, short English example sentence using the word "${en}" (which means "${uz}" in Uzbek). The sentence should be easy to understand for beginners. Reply ONLY with the sentence, nothing else. No quotes, no explanation.`;
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        if (!res.ok) {
          box.style.display = 'none';
          aiGeneratedExample = '';
          return;
        }

        const data = await res.json();
        const sentence = data.choices[0].message.content.trim().replace(/^["']|["']$/g, '');
        aiGeneratedExample = sentence;
        textEl.textContent = '"' + sentence + '"';
      } catch(e) {
        console.error('generateExample error:', e);
        box.style.display = 'none';
        aiGeneratedExample = '';
      }
    }

    window.addWord = async () => {
      const en = document.getElementById('word-en').value.trim();
      const uz = document.getElementById('word-uz').value.trim();

      if (!en || !uz) return showToast("Inglizcha va o'zbekcha so'zlarni kiriting!", true);

      const btn = document.getElementById('add-btn');
      btn.disabled = true;

      // So'zni DARHOL saqlaymiz, AI ni kutmaymiz
      const docRef = await addDoc(collection(db, 'folders', folderId, 'words'), {
        en, uz,
        example: aiGeneratedExample || '',
        createdAt: serverTimestamp()
      });

      await updateDoc(doc(db, 'folders', folderId), {
        wordCount: increment(1)
      });

      btn.disabled = false;
      closeAddModal();
      showToast("So'z qo'shildi! ✅");
      await loadWords();

      // AI fon da ishlaydi — tayyor bo'lsa example ni yangilaydi
      if (!aiGeneratedExample && en.length >= 2 && uz.length >= 1) {
        generateExample(en, uz).then(async () => {
          if (aiGeneratedExample) {
            await updateDoc(doc(db, 'folders', folderId, 'words', docRef.id), {
              example: aiGeneratedExample
            });
            await loadWords();
          }
        });
      }
    };

    window.deleteWord = async (wordId) => {
      if (!confirm("Bu so'zni o'chirasizmi?")) return;
      await deleteDoc(doc(db, 'folders', folderId, 'words', wordId));
      await updateDoc(doc(db, 'folders', folderId), {
        wordCount: increment(-1)
      });
      showToast("O'chirildi", true);
      await loadWords();
    };

    window.startStudy = () => {
      if (words.length === 0) return;
      window.location.href = `study.html?id=${folderId}`;
    };

    window.goUpload = () => {
      window.location.href = `upload.html?id=${folderId}`;
    };

    window.logout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    document.getElementById('ai-gen-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('ai-gen-modal')) closeAIGenModal();
    });

    // Enter bilan so'z qo'shish
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('add-modal').classList.contains('open')) {
        window.addWord();
      }
    });

    // AI GENERATOR
    let aiGenWords = [];

    async function loadAIUses(user) {
      try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        const uses = ud.exists() ? (ud.data().aiGeneratorUses || 0) : 0;
        const btn = document.getElementById('ai-gen-btn');
        const badge = document.getElementById('ai-uses-badge');
        if (badge) badge.textContent = uses;
        if (btn) {
          if (uses > 0) {
            btn.classList.remove('locked');
          } else {
            btn.classList.add('locked');
          }
        }
        window._aiUses = uses;
      } catch(e) {}
    }

    window.openAIGenModal = () => {
      if (!window._aiUses || window._aiUses <= 0) {
        showToast('AI Generator sotib oling! Shop ga boring', true);
        setTimeout(() => window.location.href = 'shop.html', 1500);
        return;
      }
      document.getElementById('ag-uses-left').textContent = window._aiUses;
      document.getElementById('ai-gen-step1').style.display = 'block';
      document.getElementById('ai-gen-step2').style.display = 'none';
      document.getElementById('ag-result').style.display = 'none';
      document.getElementById('ag-save-actions').style.display = 'none';
      aiGenWords = [];
      document.getElementById('ai-gen-modal').classList.add('open');
    };

    window.closeAIGenModal = () => {
      document.getElementById('ai-gen-modal').classList.remove('open');
    };

    window.runAIGenerator = async () => {
      const topic = document.getElementById('ag-topic').value.trim();
      const level = document.getElementById('ag-level').value;
      const count = document.getElementById('ag-count').value;
      if (!topic) { showToast('Mavzu kiriting', true); return; }

      const genBtn = document.getElementById('ag-generate-btn');
      genBtn.disabled = true;

      document.getElementById('ai-gen-step1').style.display = 'none';
      document.getElementById('ai-gen-step2').style.display = 'block';

      const bar = document.getElementById('ag-bar');
      const status = document.getElementById('ag-status');
      bar.style.width = '15%';
      status.textContent = 'AI generatsiya qilmoqda...';

      try {
        const prompt = `Generate exactly ${count} English vocabulary words about "${topic}" at level ${level}. Return ONLY a JSON array. Each object: {"en":"word","uz":"uzbek translation","example":"one simple sentence"}. No markdown, no explanation.`;

        bar.style.width = '40%';
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        bar.style.width = '75%';
        status.textContent = 'Natija tahlil qilinmoqda...';

        const data = await res.json();

        // API xato qaytargan bo'lsa
        if (!res.ok || !data.choices || !data.choices[0]) {
          const errMsg = data?.error?.message || 'API javob bermadi';
          throw new Error(errMsg);
        }

        const text = data.choices[0].message.content.trim();

        let parsed;
        try { parsed = JSON.parse(text); }
        catch(e) {
          const m = text.match(/\[[\s\S]*\]/);
          parsed = m ? JSON.parse(m[0]) : [];
        }
        
        if (!parsed || parsed.length === 0) {
          throw new Error("AI so'z generatsiya qila olmadi. Mavzuni o'zgartiring.");
        }

        bar.style.width = '100%';
        status.textContent = parsed.length + ' ta soz tayyor!';
        aiGenWords = parsed;

        // Preview
        const resultEl = document.getElementById('ag-result');
        resultEl.innerHTML = parsed.map((w,i) => `
          <div class="ai-gen-word-row">
            <span style="color:var(--text-dim);min-width:20px">${i+1}</span>
            <span class="agwr-en">${w.en}</span>
            <span class="agwr-uz">${w.uz}</span>
          </div>`).join('');
        resultEl.style.display = 'block';
        document.getElementById('ag-save-actions').style.display = 'flex';
        document.getElementById('ag-save-btn').textContent = parsed.length + ' ta soz qoshish';

      } catch(e) {
        status.textContent = 'Xato: ' + (e.message || 'Qayta urinib ko\'ring');
        bar.style.background = 'var(--danger)';
        setTimeout(() => {
          document.getElementById('ai-gen-step1').style.display = 'block';
          document.getElementById('ai-gen-step2').style.display = 'none';
          bar.style.background = '';
          bar.style.width = '0%';
        }, 2500);
        genBtn.disabled = false;
      }
    };

    window.saveAIWords = async () => {
      if (!aiGenWords.length) return;
      const btn = document.getElementById('ag-save-btn');
      btn.disabled = true; btn.textContent = 'Saqlanmoqda...';

      try {
        // Global duplikat tekshiruvi
        const allFoldersSnap = await getDocs(query(
          collection(db, 'folders'), where('uid', '==', currentUser.uid)
        ));
        const globalExisting = new Set();
        for (const fd of allFoldersSnap.docs) {
          const ws = await getDocs(collection(db, 'folders', fd.id, 'words'));
          ws.forEach(d => globalExisting.add(d.data().en.toLowerCase()));
        }

        const newWords = aiGenWords.filter(w => !globalExisting.has(w.en.toLowerCase()));
        const skipped = aiGenWords.length - newWords.length;

        for (const w of newWords) {
          await addDoc(collection(db, 'folders', folderId, 'words'), {
            en: w.en.toLowerCase(), uz: w.uz, example: w.example || '',
            createdAt: serverTimestamp()
          });
        }

        if (newWords.length) {
          await updateDoc(doc(db, 'folders', folderId), { wordCount: increment(newWords.length) });
        }

        // AI uses ayirish
        const newUses = Math.max(0, (window._aiUses || 1) - 1);
        await updateDoc(doc(db, 'users', currentUser.uid), { aiGeneratorUses: newUses });
        window._aiUses = newUses;
        const badge = document.getElementById('ai-uses-badge');
        if (badge) badge.textContent = newUses;
        if (newUses <= 0) {
          const genBtn = document.getElementById('ai-gen-btn');
          if (genBtn) genBtn.classList.add('locked');
        }

        showToast(newWords.length + ' ta soz qoshildi!' + (skipped ? ' (' + skipped + ' takror)' : ''));
        closeAIGenModal();
        await loadWords();

      } catch(e) { showToast('Xato: ' + e.message, true); }
      btn.disabled = false;
    };

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
