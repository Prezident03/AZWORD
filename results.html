<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Natija</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .results-wrap { max-width: 700px; margin: 0 auto; padding: 40px 24px; }

    .results-hero { text-align: center; margin-bottom: 40px; }
    .results-emoji { font-size: 4rem; margin-bottom: 16px; }
    .results-hero h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .results-hero p { color: var(--text-muted); font-size: 0.95rem; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid var(--purple-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 24px auto;
      background: var(--purple-glow);
    }

    .score-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--purple-light);
      line-height: 1;
    }

    .score-total { font-size: 0.8rem; color: var(--text-muted); }

    .section-label { margin-bottom: 14px; }

    .result-item {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .result-item.perfect { border-color: rgba(52,211,153,0.4); }
    .result-item.has-mistakes { border-color: rgba(248,113,113,0.3); }

    .result-icon { font-size: 1.3rem; min-width: 28px; text-align: center; margin-top: 2px; }

    .result-word { flex: 1; }

    .result-en {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
    }

    .result-uz { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    .result-mistakes { font-size: 0.78rem; color: var(--danger); margin-top: 4px; }
    .result-ok { font-size: 0.78rem; color: var(--success); margin-top: 4px; }

    /* Xato so'zlarning to'g'ri javoblari */
    .correct-answer-box {
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 8px;
    }

    .correct-answer-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .correct-answer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .correct-en {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--purple-light);
    }

    .correct-arrow { color: var(--text-dim); font-size: 0.9rem; }

    .correct-uz {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .correct-example {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 4px;
    }

    /* Mistakes section */
    .mistakes-section {
      margin-bottom: 32px;
    }

    .mistakes-section .section-label {
      color: var(--danger);
    }

    /* Actions */
    .results-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-retry {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--purple-main);
      border-radius: 12px;
      color: var(--purple-light);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-retry:hover { background: var(--purple-glow); }

    .btn-home {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-home:hover { opacity: 0.88; }

    /* Reward box */
    .reward-box {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    .reward-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .reward-icon { font-size: 2rem; }
    .reward-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
    }
    .reward-amount.star { color: #fbbf24; }
    .reward-amount.coin { color: #34d399; }
    .reward-label { font-size: 0.75rem; color: var(--text-muted); }
    .reward-divider { width: 1px; height: 48px; background: var(--border); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">AzWord</div>
    <div class="nav-user">
      <button class="btn-sm" onclick="window.location.href='dashboard.html'">Dashboard</button>
    </div>
  </nav>

  <div class="results-wrap">

    <div class="results-hero">
      <div class="results-emoji" id="result-emoji">🎉</div>
      <h1 id="result-title">Mashq yakunlandi!</h1>
      <p id="result-subtitle">Natijalaringiz quyida</p>

      <div class="score-circle">
        <div class="score-num" id="score-num">0/0</div>
        <div class="score-total">mukammal so'z</div>
      </div>
    </div>

    <!-- Xato so'zlar — to'g'ri javoblar bilan -->
    <div id="mistakes-section" style="display:none" class="mistakes-section">
      <div class="section-label" style="color:var(--danger)">❌ Xato qilingan so'zlar — to'g'ri javoblar</div>
      <div id="mistakes-list"></div>
    </div>

    <!-- Barcha so'zlar natijalari -->
    <div class="section-label">📋 Barcha so'zlar natijalari</div>
    <div id="results-list"></div>

    <div class="results-actions">
      <button class="btn-retry" onclick="retry()">🔄 Qaytadan ishlash</button>
      <button class="btn-home" onclick="window.location.href='dashboard.html'">🏠 Bosh sahifa</button>
    </div>

  </div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc, increment, collection, getDocs, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const folderId = params.get('id');

    const resultsRaw = sessionStorage.getItem('studyResults');
    const wordsRaw = sessionStorage.getItem('studyWords');

    if (!resultsRaw || !wordsRaw) {
      window.location.href = 'dashboard.html';
    }

    const results = JSON.parse(resultsRaw);
    const words = JSON.parse(wordsRaw);

    const STAGE_NAMES = {
      1: 'Tanishish',
      2: 'Variantlar',
      3: "Bo'laklash",
      4: 'Moslashtirish',
      5: 'Yozish',
      6: 'Gap tuzish'
    };

    const totalWords = words.length;
    const perfectWords = Object.values(results).filter(r => r.mistakes.length === 0).length;
    const mistakeWords = words.filter(w => results[w.id] && results[w.id].mistakes.length > 0);

    // Score display
    document.getElementById('score-num').textContent = `${perfectWords}/${totalWords}`;

    // Reward: faqat birinchi marta mukammal o'zlashtirilgan so'zlar uchun
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        // Mukammal so'zlarni topamiz
        const perfectWordsList = words.filter(w => results[w.id] && results[w.id].mistakes.length === 0);
        if (perfectWordsList.length === 0) return;

        // Har bir so'zning folderId sini topamiz (sessionStorage dan)
        const folderId = params.get('id');
        if (!folderId) return;

        // Qaysi so'zlar hali reward olmagan — tekshiramiz
        let newlyRewarded = 0;
        for (const word of perfectWordsList) {
          const wordRef = doc(db, 'folders', folderId, 'words', word.id);
          const wordSnap = await getDoc(wordRef);
          if (wordSnap.exists() && !wordSnap.data().rewarded) {
            // Birinchi marta — reward beramiz va belgilaymiz
            await updateDoc(wordRef, { rewarded: true });
            newlyRewarded++;
          }
        }

        // Faqat yangi so'zlar uchun coin/star beramiz
        if (newlyRewarded > 0) {
          // Haftalik reset uchun weekKey (2024-W01 formatda)
          const now = new Date();
          const weekNum = Math.ceil((((now - new Date(now.getFullYear(), 0, 1)) / 86400000) + new Date(now.getFullYear(), 0, 1).getDay() + 1) / 7);
          const weekKey = `${now.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;

          await setDoc(doc(db, 'users', user.uid), {
            coins: increment(newlyRewarded),
            stars: increment(newlyRewarded),
            weeklyStars: increment(newlyRewarded),
            weekKey: weekKey,
            displayName: user.displayName || user.email.split('@')[0]
          }, { merge: true });

          // Reward box ko'rsatish
          const rewardBox = document.createElement('div');
          rewardBox.className = 'reward-box';
          rewardBox.innerHTML = `
            <div class="reward-item">
              <div class="reward-icon">⭐</div>
              <div class="reward-amount star">+${newlyRewarded}</div>
              <div class="reward-label">Yulduzcha</div>
            </div>
            <div class="reward-divider"></div>
            <div class="reward-item">
              <div class="reward-icon">🪙</div>
              <div class="reward-amount coin">+${newlyRewarded}</div>
              <div class="reward-label">Tanga</div>
            </div>
          `;
          document.querySelector('.results-hero').appendChild(rewardBox);
        } else {
          // Hammasi oldin reward olgan
          const infoBox = document.createElement('div');
          infoBox.className = 'reward-box';
          infoBox.style.opacity = '0.6';
          infoBox.innerHTML = `
            <div style="text-align:center;color:var(--text-muted);font-size:0.9rem;">
              🏅 Bu so'zlar uchun mukofot oldin berilgan
            </div>
          `;
          document.querySelector('.results-hero').appendChild(infoBox);
        }

      } catch(e) {
        console.error('Reward xato:', e);
      }
    });

    // Emoji & title
    const pct = perfectWords / totalWords;
    if (pct === 1) {
      document.getElementById('result-emoji').textContent = '🏆';
      document.getElementById('result-title').textContent = 'Mukammal natija!';
      document.getElementById('result-subtitle').textContent = "Barcha so'zlarni to'liq o'zlashtirdingiz!";
    } else if (pct >= 0.7) {
      document.getElementById('result-emoji').textContent = '🎉';
      document.getElementById('result-title').textContent = "Zo'r natija!";
      document.getElementById('result-subtitle').textContent = 'Juda yaxshi, davom eting!';
    } else if (pct >= 0.4) {
      document.getElementById('result-emoji').textContent = '💪';
      document.getElementById('result-title').textContent = 'Yaxshi urinish!';
      document.getElementById('result-subtitle').textContent = 'Yana bir marta ishlasangiz yanada yaxshi bo\'ladi.';
    } else {
      document.getElementById('result-emoji').textContent = '📚';
      document.getElementById('result-title').textContent = "O'rganishda davom eting!";
      document.getElementById('result-subtitle').textContent = 'Qaytadan ishlash tavsiya etiladi.';
    }

    // Xato so'zlar bo'limi
    if (mistakeWords.length > 0) {
      document.getElementById('mistakes-section').style.display = 'block';
      const mistakesList = document.getElementById('mistakes-list');
      mistakeWords.forEach(word => {
        const r = results[word.id];
        const div = document.createElement('div');
        div.className = 'result-item has-mistakes';
        div.innerHTML = `
          <div class="result-icon">❌</div>
          <div class="result-word">
            <div class="result-en">${word.en}</div>
            <div class="result-uz">${word.uz}</div>
            <div class="result-mistakes">Xato bosqichlar: ${r.mistakes.map(s => STAGE_NAMES[s]).join(', ')}</div>
            <div class="correct-answer-box">
              <div class="correct-answer-label">✏️ To'g'ri javob</div>
              <div class="correct-answer-row">
                <span class="correct-en">${word.en}</span>
                <span class="correct-arrow">→</span>
                <span class="correct-uz">${word.uz}</span>
              </div>
              ${word.example ? `<div class="correct-example">"${word.example}"</div>` : ''}
            </div>
          </div>
        `;
        mistakesList.appendChild(div);
      });
    }

    // Barcha so'zlar ro'yxati
    const list = document.getElementById('results-list');
    words.forEach(word => {
      const r = results[word.id];
      const perfect = r.mistakes.length === 0;
      const div = document.createElement('div');
      div.className = `result-item ${perfect ? 'perfect' : 'has-mistakes'}`;
      div.innerHTML = `
        <div class="result-icon">${perfect ? '✅' : '❌'}</div>
        <div class="result-word">
          <div class="result-en">${word.en}</div>
          <div class="result-uz">${word.uz}</div>
          ${perfect
            ? `<div class="result-ok">Barcha bosqichlar to'g'ri ✓</div>`
            : `<div class="result-mistakes">Xato bosqichlar: ${r.mistakes.map(s => STAGE_NAMES[s]).join(', ')}</div>`
          }
        </div>
      `;
      list.appendChild(div);
    });

    window.retry = () => {
      window.location.href = `study.html?id=${folderId}`;
    };
  </script>
</body>
</html>
