<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzWord — Kirish</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <div class="logo-text">AzWord</div>
        <p>Ingliz so'zlarini oson o'zlashtirib boring</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Kirish</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
      </div>

      <!-- Error -->
      <div class="auth-error" id="auth-error"></div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label>Parol</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="login()">Kirish</button>
        <div class="divider">yoki</div>
        <button class="btn-google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Google bilan kirish
        </button>
      </div>

      <!-- Register Form -->
      <div id="form-register" style="display:none">
        <div class="form-group">
          <label>Ism</label>
          <input type="text" id="reg-name" placeholder="Ismingiz" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label>Parol</label>
          <input type="password" id="reg-password" placeholder="Kamida 6 ta belgi" />
        </div>
        <button class="btn-primary" onclick="register()">Ro'yxatdan o'tish</button>
        <div class="divider">yoki</div>
        <button class="btn-google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Google bilan ro'yxatdan o'tish
        </button>
      </div>

    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase.js';
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      updateProfile,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Agar kirgan bo'lsa dashboard ga o'tkazamiz
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    window.switchTab = (tab) => {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      showError('');
    };

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    window.login = async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      if (!email || !pass) return showError("Email va parolni kiriting");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        showError("Email yoki parol noto'g'ri");
      }
    };

    window.register = async () => {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-password').value;
      if (!name || !email || !pass) return showError("Barcha maydonlarni to'ldiring");
      if (pass.length < 6) return showError("Parol kamida 6 ta belgi bo'lishi kerak");
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        window.location.href = 'dashboard.html';
      } catch (e) {
        if (e.code === 'auth/email-already-in-use') showError("Bu email allaqachon ro'yxatdan o'tgan");
        else showError("Xato yuz berdi, qayta urinib ko'ring");
      }
    };

    window.loginGoogle = async () => {
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
      } catch (e) {
        showError("Google bilan kirishda xato yuz berdi");
      }
    };
  </script>
</body>
</html>
